<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature's Essence | Tienda Orgánica e IA</title>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Tailwind CSS para diseño rápido -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #faf9f6; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .product-card:hover { transform: translateY(-5px); transition: all 0.3s ease; }
    </style>
</head>
<body class="text-stone-900">

    <!-- Navegación -->
    <nav class="fixed top-0 w-full glass z-50 border-b border-stone-200">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="showTab('home')">
                <i data-lucide="leaf" class="text-emerald-600"></i>
                <span class="font-bold text-xl tracking-tight">Nature's Essence</span>
            </div>
            <div class="flex gap-6 font-medium">
                <button onclick="showTab('home')" class="hover:text-emerald-600 transition-colors">Catálogo</button>
                <button onclick="showTab('ia')" class="hover:text-emerald-600 transition-colors">Asistente AI</button>
            </div>
        </div>
    </nav>

    <!-- Contenido Principal -->
    <div id="content" class="pt-24 pb-20">
        <!-- Pestaña Inicio (Catálogo) -->
        <section id="home-tab" class="max-w-7xl mx-auto px-6">
            <header class="text-center mb-16">
                <h1 class="text-5xl font-black mb-4">Bienestar del Himalaya</h1>
                <p class="text-stone-500 text-lg max-w-2xl mx-auto">Productos orgánicos certificados para tu salud física y mental.</p>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="product-grid">
                <!-- Los productos se cargan aquí con JS -->
            </div>

            <!-- Banner IA -->
            <div class="mt-20 bg-stone-900 rounded-[2.5rem] p-10 md:p-16 text-white relative overflow-hidden">
                <div class="relative z-10 max-w-lg">
                    <h2 class="text-4xl font-bold mb-4">¿No sabes qué elegir?</h2>
                    <p class="text-stone-400 mb-8">Nuestro asistente experto te guía según tus necesidades de salud.</p>
                    <button onclick="showTab('ia')" class="bg-emerald-500 hover:bg-emerald-400 px-8 py-4 rounded-2xl font-bold transition-all">
                        Consultar Asistente Gratis
                    </button>
                </div>
            </div>
        </section>

        <!-- Pestaña IA -->
        <section id="ia-tab" class="hidden max-w-5xl mx-auto px-6">
            <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-stone-100">
                <div class="p-6 bg-stone-50 border-b flex items-center justify-between">
                    <div>
                        <h2 class="font-bold text-xl">Wellness Agent</h2>
                        <p class="text-xs text-emerald-600 font-bold uppercase tracking-widest">● Modo Invitado</p>
                    </div>
                    <button onclick="reloadIframe()" class="p-2 bg-white rounded-full border shadow-sm hover:bg-stone-50">
                        <i data-lucide="refresh-cw" class="w-5 h-5 text-stone-400"></i>
                    </button>
                </div>
                <div class="relative w-full h-[650px] bg-stone-100">
                    <iframe id="ai-iframe" src="https://bey.chat/agent/bd90bc32-df5a-4954-9f63-c852ef1d9efb?force_guest=true" 
                        class="w-full h-full border-none" allow="camera; microphone; clipboard-read; clipboard-write; encrypted-media">
                    </iframe>
                </div>
            </div>
        </section>
    </div>

    <script>
        const products = [
            { id: 1, name: "Himalayan Wellness Tea", price: 12.99, cat: "Teas", img: "https://images.unsplash.com/photo-1594631252845-29fc4586c567?q=80&w=400" },
            { id: 2, name: "Pure Moringa Powder", price: 9.49, cat: "Superfoods", img: "https://images.unsplash.com/photo-1515694346937-94d85e41e6f0?q=80&w=400" },
            { id: 3, name: "Triphala Capsules", price: 10.99, cat: "Supplements", img: "https://images.unsplash.com/photo-1611689225620-3e70248bc0f0?q=80&w=400" },
            { id: 4, name: "Lavender Essential Oil", price: 21.99, cat: "Oils", img: "https://images.unsplash.com/photo-1602928321679-560bb453f190?q=80&w=400" },
            { id: 5, name: "Golden Milk Blend", price: 7.99, cat: "Superfoods", img: "https://images.unsplash.com/photo-1615485500704-8e990f3900f1?q=80&w=400" },
            { id: 6, name: "Ashwagandha KSM-66", price: 15.49, cat: "Supplements", img: "https://images.unsplash.com/photo-1471193945509-9ad0617afabf?q=80&w=400" }
        ];

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => `
                <div class="product-card bg-white rounded-3xl p-4 shadow-sm border border-stone-100">
                    <img src="${p.img}" class="w-full h-64 object-cover rounded-2xl mb-4">
                    <span class="text-[10px] font-bold text-emerald-600 uppercase tracking-widest">${p.cat}</span>
                    <h3 class="font-bold text-lg mb-2">${p.name}</h3>
                    <div class="flex justify-between items-center">
                        <span class="text-xl font-black">$${p.price}</span>
                        <button class="bg-stone-900 text-white p-2 rounded-xl hover:bg-emerald-600 transition-colors">
                            <i data-lucide="plus"></i>
                        </button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function showTab(tab) {
            document.getElementById('home-tab').classList.toggle('hidden', tab !== 'home');
            document.getElementById('ia-tab').classList.toggle('hidden', tab !== 'ia');
            window.scrollTo(0, 0);
        }

        function reloadIframe() {
            const iframe = document.getElementById('ai-iframe');
            iframe.src = iframe.src;
        }

        // Inicializar
        window.onload = () => {
            renderProducts();
            lucide.createIcons();
        };
    </script>
</body>
</html>
